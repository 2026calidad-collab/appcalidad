<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal Calidad – PDC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  /* ── RESET & BASE ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:   #2e7d32;
    --green-l: #43a047;
    --green-d: #1b5e20;
    --gray:    #f4f6f8;
    --border:  #dde1e7;
    --text:    #212121;
    --muted:   #6b7280;
    --red:     #c62828;
    --ok-bg:   #e8f5e9;
    --ok-txt:  #2e7d32;
    --warn-bg: #fff3e0;
    --warn-txt:#e65100;
    --radius:  8px;
    --shadow:  0 2px 8px rgba(0,0,0,.12);
  }
  body { font-family: 'Segoe UI', sans-serif; background: var(--gray); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ────────────────────────────────────── */
  #loginPage {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: linear-gradient(135deg, var(--green-d) 0%, var(--green-l) 100%);
  }
  .login-card {
    background: #fff; border-radius: 12px; padding: 2.5rem 2rem;
    width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.25);
  }
  .login-logo { text-align: center; margin-bottom: 1.5rem; }
  .login-logo span { font-size: 2.5rem; }
  .login-logo h1 { color: var(--green-d); font-size: 1.3rem; margin-top: .4rem; }
  .login-logo p  { color: var(--muted); font-size: .85rem; }

  /* ── APP SHELL ────────────────────────────────── */
  #appPage { display: none; flex-direction: column; min-height: 100vh; }

  /* NAVBAR */
  .navbar {
    background: var(--green-d); color: #fff; padding: .8rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100;
  }
  .navbar-brand { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
  .navbar-user  { display: flex; align-items: center; gap: .8rem; font-size: .9rem; }
  .badge-rol    { background: rgba(255,255,255,.2); border-radius: 20px; padding: .2rem .7rem; font-size: .75rem; }

  /* SIDEBAR + MAIN */
  .layout { display: flex; flex: 1; }
  .sidebar {
    width: 220px; background: #fff; border-right: 1px solid var(--border);
    padding: 1rem 0; flex-shrink: 0;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: .7rem;
    padding: .7rem 1.2rem; cursor: pointer; font-size: .92rem;
    color: var(--text); transition: background .15s;
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover   { background: var(--gray); }
  .sidebar-item.active  { background: var(--ok-bg); color: var(--green-d); border-left-color: var(--green); font-weight: 600; }

  .main { flex: 1; padding: 1.5rem; overflow-x: auto; }

  /* ── CARDS / PANELES ──────────────────────────── */
  .panel { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; margin-bottom: 1.5rem; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
  .panel-title  { font-size: 1.05rem; font-weight: 700; color: var(--green-d); display: flex; align-items: center; gap: .5rem; }

  /* ── FORM ─────────────────────────────────────── */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: .3rem; }
  .form-group label { font-size: .82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .form-group input,
  .form-group select { border: 1px solid var(--border); border-radius: var(--radius); padding: .52rem .75rem; font-size: .9rem; transition: border-color .2s; }
  .form-group input:focus,
  .form-group select:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(46,125,50,.12); }

  /* ── BUTTONS ──────────────────────────────────── */
  .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.2rem; border-radius: var(--radius); border: none; font-size: .9rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary  { background: var(--green);   color: #fff; }
  .btn-primary:hover { background: var(--green-d); }
  .btn-outline  { background: #fff; color: var(--green); border: 1px solid var(--green); }
  .btn-outline:hover { background: var(--ok-bg); }
  .btn-danger   { background: var(--red); color: #fff; }
  .btn-sm { padding: .3rem .7rem; font-size: .8rem; }

  /* ── TABLE ────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .83rem; white-space: nowrap; }
  th { background: var(--green-d); color: #fff; padding: .6rem .8rem; font-weight: 600; text-align: left; position: sticky; top: 0; }
  td { padding: .55rem .8rem; border-bottom: 1px solid var(--border); }
  tr:hover td { background: var(--gray); }
  .status-badge { padding: .2rem .6rem; border-radius: 20px; font-size: .75rem; font-weight: 700; }
  .s-procesado  { background: #e8f5e9; color: #2e7d32; }
  .s-piso       { background: #fff3e0; color: #e65100; }
  .s-default    { background: #ede7f6; color: #4527a0; }
  .ok-cell      { color: var(--green); font-weight: 700; }
  .nok-cell     { color: var(--red);   font-weight: 700; }

  /* ── TOAST ────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
    background: #323232; color: #fff; padding: .8rem 1.4rem;
    border-radius: var(--radius); font-size: .88rem; box-shadow: var(--shadow);
    transform: translateY(80px); opacity: 0; transition: all .3s ease;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { background: var(--red); }
  #toast.success { background: var(--green); }

  /* ── LOADER ───────────────────────────────────── */
  .loader { text-align: center; padding: 2rem; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MODAL ────────────────────────────────────── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #fff; border-radius: 12px; padding: 1.8rem; width: 95%; max-width: 860px; max-height: 90vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,.3); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
  .modal-title  { font-size: 1.05rem; font-weight: 700; color: var(--green-d); }
  .modal-close  { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal-footer { margin-top: 1.2rem; display: flex; gap: .7rem; justify-content: flex-end; }

  /* ── SEARCH ───────────────────────────────────── */
  .search-bar { display: flex; gap: .7rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .search-bar input { border: 1px solid var(--border); border-radius: var(--radius); padding: .45rem .75rem; font-size: .88rem; min-width: 220px; }

  /* ── UPLOAD ZONE ──────────────────────────────── */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 2rem; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s; background: var(--gray);
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--green); background: var(--ok-bg); }
  .upload-zone .upload-icon { font-size: 2.5rem; }
  .upload-zone p { color: var(--muted); margin-top: .5rem; font-size: .88rem; }
  .upload-zone strong { color: var(--green); }

  /* ── RESULT CHIPS ─────────────────────────────── */
  .result-chips { display: flex; gap: .7rem; flex-wrap: wrap; margin-top: 1rem; }
  .chip { padding: .4rem 1rem; border-radius: 20px; font-size: .85rem; font-weight: 700; }
  .chip-added   { background: #e8f5e9; color: #2e7d32; }
  .chip-updated { background: #e3f2fd; color: #1565c0; }
  .chip-skipped { background: #f5f5f5; color: #616161; }
  .chip-total   { background: #ede7f6; color: #4527a0; }

  /* ── RESPONSIVE ───────────────────────────────── */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     LOGIN PAGE
══════════════════════════════════════════════ -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <span>🥑</span>
      <h1>Portal Calidad</h1>
      <p>Packing del Carmen SAC</p>
    </div>
    <div class="form-group" style="margin-bottom:.9rem">
      <label>Usuario</label>
      <input id="loginUser" type="text" placeholder="Ingresa tu usuario" autocomplete="username"/>
    </div>
    <div class="form-group" style="margin-bottom:1.3rem">
      <label>Contraseña</label>
      <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">
      Ingresar
    </button>
    <p id="loginError" style="color:var(--red);font-size:.83rem;margin-top:.7rem;text-align:center;display:none"></p>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     APP PAGE
══════════════════════════════════════════════ -->
<div id="appPage">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">🥑 Portal Calidad</div>
    <div class="navbar-user">
      <span id="navNombre"></span>
      <span class="badge-rol" id="navRol"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-item active" id="nav-guias" onclick="showSection('guias',this)">
        📋 Registro de Guías
      </div>
      <div class="sidebar-item" id="nav-fuc" onclick="showSection('fuc',this)">
        📁 Base de FUC
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- ── SECCIÓN: GUÍAS ─────────────────────── -->
      <div id="secGuias">

        <!-- Botón + tabla -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📋 Guías a Procesar</span>
            <button class="btn btn-primary" onclick="openModal()">＋ Nueva Guía</button>
          </div>

          <div class="search-bar">
            <input id="searchInput" type="text" placeholder="Buscar por guía, cliente, lote…" oninput="filterTable()"/>
            <button class="btn btn-outline btn-sm" onclick="loadGuias()">🔄 Actualizar</button>
          </div>

          <div id="tableContainer" class="table-wrap">
            <div class="loader"><div class="spinner"></div><p style="margin-top:.5rem">Cargando…</p></div>
          </div>
        </div>

      </div><!-- /secGuias -->

      <!-- ── SECCIÓN: BASE DE FUC ──────────────── -->
      <div id="secFuc" style="display:none">

        <!-- Upload -->
        <div class="panel">
          <div class="panel-title" style="margin-bottom:1rem">📁 Cargar Excel de FUC</div>

          <div class="upload-zone" id="uploadZone"
               onclick="document.getElementById('fileInput').click()"
               ondragover="event.preventDefault();this.classList.add('drag')"
               ondragleave="this.classList.remove('drag')"
               ondrop="handleDrop(event)">
            <div class="upload-icon">📄</div>
            <p>Arrastra el Excel aquí o <strong>haz clic para seleccionar</strong></p>
            <p>Formatos aceptados: .xlsx, .xls</p>
          </div>
          <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])"/>

          <div id="uploadResult" style="display:none;margin-top:1rem">
            <div id="uploadMsg" style="font-weight:600;margin-bottom:.3rem"></div>
            <div class="result-chips" id="resultChips"></div>
          </div>
        </div>

        <!-- Tabla FUC -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📋 Fichas Únicas de Campo</span>
            <button class="btn btn-outline btn-sm" onclick="loadFUCs()">🔄 Actualizar</button>
          </div>
          <div class="search-bar">
            <input id="searchFUC" type="text" placeholder="Buscar por FUC, productor, lote…" oninput="filterFUCTable()"/>
          </div>
          <div id="fucTableContainer" class="table-wrap">
            <div class="loader"><div class="spinner"></div><p style="margin-top:.5rem">Cargando…</p></div>
          </div>
        </div>

      </div><!-- /secFuc -->

    </main>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     MODAL – FORMULARIO GUÍA
══════════════════════════════════════════════ -->
<div class="modal-overlay" id="guiaModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nueva Guía</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <input type="hidden" id="editRow"/>

    <div class="form-grid">
      <div class="form-group">
        <label>Variedad</label>
        <select id="fVariedad">
          <option value="">-- Seleccionar --</option>
          <option value="HASS">HASS</option>
          <option value="FUERTE">FUERTE</option>
          <option value="ZUTANO">ZUTANO</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cliente</label>
        <input id="fCliente" type="text" placeholder="Nombre del cliente"/>
      </div>
      <div class="form-group">
        <label>Fecha de Guía</label>
        <input id="fFechaGuia" type="date"/>
      </div>
      <div class="form-group">
        <label>Fecha de Ingreso</label>
        <input id="fFechaIngreso" type="date"/>
      </div>
      <div class="form-group">
        <label>N° Guía</label>
        <input id="fNGuia" type="text" placeholder="Ej. EG07-4173"/>
      </div>
      <div class="form-group">
        <label>CLP</label>
        <input id="fCLP" type="text" placeholder="Ej. 016-00195-02"/>
      </div>
      <div class="form-group">
        <label>Productor</label>
        <input id="fProductor" type="text" placeholder="Nombre del productor"/>
      </div>
      <div class="form-group">
        <label>Lote</label>
        <input id="fLote" type="text" placeholder="Nombre del lote"/>
      </div>
      <div class="form-group">
        <label>Certificación de LP</label>
        <select id="fCertLP">
          <option value="">-- Seleccionar --</option>
          <option value="OK">OK</option>
          <option value="NO OK">NO OK</option>
        </select>
      </div>
      <div class="form-group">
        <label>MTD</label>
        <select id="fMTD">
          <option value="">-- Seleccionar --</option>
          <option value="OK">OK</option>
          <option value="NO OK">NO OK</option>
        </select>
      </div>
      <div class="form-group">
        <label>Materia Seca</label>
        <select id="fMateriaSeca">
          <option value="">-- Seleccionar --</option>
          <option value="OK">OK</option>
          <option value="NO OK">NO OK</option>
        </select>
      </div>
      <div class="form-group">
        <label>QR / DUA</label>
        <select id="fQRDUA">
          <option value="">-- Seleccionar --</option>
          <option value="OK">OK</option>
          <option value="NO OK">NO OK</option>
        </select>
      </div>
      <div class="form-group">
        <label>Vinculación de SISA</label>
        <select id="fVinculacionSISA">
          <option value="">-- Seleccionar --</option>
          <option value="OK">OK</option>
          <option value="NO OK">NO OK</option>
          <option value="PENDIENTE">PENDIENTE</option>
        </select>
      </div>
      <div class="form-group">
        <label>% Dif. Quereme</label>
        <input id="fPctDif" type="number" step="0.01" placeholder="0.00" min="0" max="100"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option value="">-- Seleccionar --</option>
          <option value="EN PISO">EN PISO</option>
          <option value="PROCESADO">PROCESADO</option>
          <option value="RECHAZADO">RECHAZADO</option>
          <option value="EN ESPERA">EN ESPERA</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="saveGuia()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────
// ⚠️ Reemplaza esta URL por la de tu Google Apps Script desplegado como Web App
const API_URL = "https://script.google.com/macros/s/AKfycbz0pwJzKhCgTCvoGtV1b7e8lM7igxwzfwyB3UD1ZII7KJvo1K8nga3PhCHEcP_tCuk/exec";

// ── SESSION ─────────────────────────────────────────
let session = null;
let allGuias = [];

function saveSession(data) {
  session = data;
  sessionStorage.setItem("calidad_session", JSON.stringify(data));
}
function loadSession() {
  try {
    const s = sessionStorage.getItem("calidad_session");
    if (s) session = JSON.parse(s);
  } catch(_) {}
}
function clearSession() {
  session = null;
  sessionStorage.removeItem("calidad_session");
}

// ── API ─────────────────────────────────────────────
async function api(action, body = {}) {
  const payload = { action, ...body };
  if (session?.token) payload.token = session.token;

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "Error desconocido");
  return json;
}

// ── LOGIN ────────────────────────────────────────────
async function doLogin() {
  const usuario  = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value;
  const errEl    = document.getElementById("loginError");
  errEl.style.display = "none";

  if (!usuario || !password) {
    errEl.textContent = "Ingresa usuario y contraseña.";
    errEl.style.display = "block";
    return;
  }

  try {
    const data = await api("login", { usuario, password });
    saveSession(data);
    showApp();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

// Enter en campos de login
["loginUser","loginPass"].forEach(id =>
  document.getElementById(id).addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); })
);

function logout() {
  clearSession();
  document.getElementById("appPage").style.display = "none";
  document.getElementById("loginPage").style.display = "flex";
}

// ── APP INIT ─────────────────────────────────────────
function showApp() {
  document.getElementById("loginPage").style.display  = "none";
  document.getElementById("appPage").style.display    = "flex";
  document.getElementById("navNombre").textContent    = session.nombre;
  document.getElementById("navRol").textContent       = session.rol?.toUpperCase();
  showSection("guias", document.getElementById("nav-guias"));
}

window.addEventListener("load", () => {
  loadSession();
  if (session?.token) showApp();
});

// ── GUÍAS – CARGA ────────────────────────────────────
async function loadGuias() {
  document.getElementById("tableContainer").innerHTML =
    '<div class="loader"><div class="spinner"></div><p style="margin-top:.5rem">Cargando…</p></div>';
  try {
    const res = await api("getGuias");
    allGuias  = res.data || [];
    renderTable(allGuias);
  } catch(e) {
    document.getElementById("tableContainer").innerHTML =
      `<p style="color:var(--red);padding:1rem">Error: ${e.message}</p>`;
    if (e.message.includes("expirad") || e.message.includes("nválido")) logout();
  }
}

function filterTable() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allGuias.filter(g =>
    Object.values(g).some(v => String(v).toLowerCase().includes(q))
  );
  renderTable(filtered);
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById("tableContainer").innerHTML =
      '<p style="padding:1.5rem;color:var(--muted);text-align:center">Sin registros.</p>';
    return;
  }

  const cols = [
    { key:"VARIEDAD",         label:"Variedad" },
    { key:"CLIENTE",          label:"Cliente" },
    { key:"FECHA_GUIA",       label:"F. Guía" },
    { key:"FECHA_INGRESO",    label:"F. Ingreso" },
    { key:"N_GUIA",           label:"N° Guía" },
    { key:"CLP",              label:"CLP" },
    { key:"PRODUCTOR",        label:"Productor" },
    { key:"LOTE",             label:"Lote" },
    { key:"CERT_LP",          label:"Cert. LP" },
    { key:"MTD",              label:"MTD" },
    { key:"MATERIA_SECA",     label:"Mat. Seca" },
    { key:"QR_DUA",           label:"QR/DUA" },
    { key:"VINCULACION_SISA", label:"Vinc. SISA" },
    { key:"PCT_DIF_QUEREME",  label:"% Dif." },
    { key:"STATUS",           label:"Status" },
  ];

  const ths = cols.map(c => `<th>${c.label}</th>`).join("") + "<th>Acciones</th>";
  const trs = rows.map(g => {
    const tds = cols.map(c => {
      const v = g[c.key] ?? "";
      if (["CERT_LP","MTD","MATERIA_SECA","QR_DUA","VINCULACION_SISA"].includes(c.key)) {
        const cls = v === "OK" ? "ok-cell" : v ? "nok-cell" : "";
        return `<td class="${cls}">${v}</td>`;
      }
      if (c.key === "STATUS") {
        const sc = v === "PROCESADO" ? "s-procesado" : v === "EN PISO" ? "s-piso" : "s-default";
        return `<td><span class="status-badge ${sc}">${v}</span></td>`;
      }
      if (c.key === "PCT_DIF_QUEREME" && v !== "") return `<td>${parseFloat(v).toFixed(2)}%</td>`;
      return `<td>${v}</td>`;
    }).join("");

    return `<tr>
      ${tds}
      <td>
        <button class="btn btn-outline btn-sm" onclick='editGuia(${JSON.stringify(g)})'>✏️</button>
        <button class="btn btn-danger btn-sm" style="margin-left:.3rem" onclick="deleteGuia(${g._row})">🗑️</button>
      </td>
    </tr>`;
  }).join("");

  document.getElementById("tableContainer").innerHTML =
    `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

// ── MODAL ─────────────────────────────────────────────
function openModal() {
  document.getElementById("modalTitle").textContent = "Nueva Guía";
  document.getElementById("editRow").value = "";

  document.getElementById("guiaModal").classList.add("open");
}

function closeModal() {

}

function clearForm() {

function editGuia(g) {
  document.getElementById("modalTitle").textContent = "Editar Guía";
  document.getElementById("editRow").value = g._row;

  document.getElementById("fVariedad").value       = g.VARIEDAD        || "";
  document.getElementById("fCliente").value        = g.CLIENTE         || "";
  document.getElementById("fFechaGuia").value      = g.FECHA_GUIA      || "";
  document.getElementById("fFechaIngreso").value   = g.FECHA_INGRESO   || "";
  document.getElementById("fNGuia").value          = g.N_GUIA          || "";
  document.getElementById("fCLP").value            = g.CLP             || "";
  document.getElementById("fProductor").value      = g.PRODUCTOR       || "";
  document.getElementById("fLote").value           = g.LOTE            || "";
  document.getElementById("fCertLP").value         = g.CERT_LP         || "";
  document.getElementById("fMTD").value            = g.MTD             || "";
  document.getElementById("fMateriaSeca").value    = g.MATERIA_SECA    || "";
  document.getElementById("fQRDUA").value          = g.QR_DUA          || "";
  document.getElementById("fVinculacionSISA").value= g.VINCULACION_SISA|| "";
  document.getElementById("fPctDif").value         = g.PCT_DIF_QUEREME || "";

// ── GUARDAR ───────────────────────────────────────────
async function saveGuia() {
  const btn  = document.getElementById("btnGuardar");
  const row  = document.getElementById("editRow").value;

  const guia = {
    VARIEDAD:         document.getElementById("fVariedad").value,
    CLIENTE:          document.getElementById("fCliente").value.trim(),
    FECHA_GUIA:       document.getElementById("fFechaGuia").value,
    FECHA_INGRESO:    document.getElementById("fFechaIngreso").value,
    N_GUIA:           document.getElementById("fNGuia").value.trim(),
    CLP:              document.getElementById("fCLP").value.trim(),
    PRODUCTOR:        document.getElementById("fProductor").value.trim(),
    LOTE:             document.getElementById("fLote").value.trim(),
    CERT_LP:          document.getElementById("fCertLP").value,
    MTD:              document.getElementById("fMTD").value,
    MATERIA_SECA:     document.getElementById("fMateriaSeca").value,
    QR_DUA:           document.getElementById("fQRDUA").value,
    VINCULACION_SISA: document.getElementById("fVinculacionSISA").value,
    PCT_DIF_QUEREME:  document.getElementById("fPctDif").value,
    STATUS:           document.getElementById("fStatus").value,
  };

  if (!guia.N_GUIA) { showToast("N° Guía es obligatorio.", "error"); return; }

  btn.disabled = true;
  btn.textContent = "Guardando…";

  try {
    if (row) {
      guia._row = parseInt(row);
      await api("updateGuia", { guia });
      showToast("Guía actualizada.", "success");
    } else {
      await api("addGuia", { guia });
      showToast("Guía registrada.", "success");
    }
    closeModal();
    loadGuias();
  } catch(e) {
    showToast(e.message, "error");
  } finally {
    btn.disabled    = false;
    btn.textContent = "💾 Guardar";
  }
}

// ── ELIMINAR ──────────────────────────────────────────
async function deleteGuia(rowNum) {
  if (!confirm("¿Eliminar esta guía?")) return;
  try {
    await api("deleteGuia", { row: rowNum });
    showToast("Guía eliminada.", "success");
    loadGuias();
  } catch(e) {
    showToast(e.message, "error");
  }
}

// ── COL_MAP – mapeo de cabeceras normalizadas ──────────
const COL_MAP = {
  "ID":                          "id",
  "CERTIFICADO ORGANICO":        "certificado_organico",
  "CERTIFICADO":                 "certificado_organico",
  "CODIGO LUGAR PRODUCCION":     "codigo_lugar_produccion",
  "CODIGO LUGAR DE PRODUCCION":  "codigo_lugar_produccion",
  "CLP":                         "codigo_lugar_produccion",
  "DEPARTAMENTO":                "departamento",
  "EMPRESA CERTIFICADORA":       "empresa_certificadora",
  "CERTIFICADORA":               "empresa_certificadora",
  "EXPORTADOR":                  "exportador",
  "FECHA INGRESO":               "fecha_ingreso",
  "FECHA DE INGRESO":            "fecha_ingreso",
  "FECHA PROCESO":               "fecha_proceso",
  "FECHA DE PROCESO":            "fecha_proceso",
  "FIN DESCARGA":                "fin_descarga",
  "GGN":                         "ggn",
  "GUIA INGRESO":                "guia_ingreso",
  "GUIA DE INGRESO":             "guia_ingreso",
  "N GUIA":                      "guia_ingreso",
  "N° GUIA":                     "guia_ingreso",
  "GUIA INGRESO LOCAL":          "guia_ingreso_local",
  "INGRESO GARITA":              "ingreso_garita",
  "INICIO DESCARGA":             "inicio_descarga",
  "LINEA EMPAQUE":               "linea_empaque",
  "LINEA DE EMPAQUE":            "linea_empaque",
  "LOTE":                        "lote",
  "MARCA":                       "marca",
  "NUM FUC":                     "num_fuc",
  "N FUC":                       "num_fuc",
  "N° FUC":                      "num_fuc",
  "NUMERO FUC":                  "num_fuc",
  "FUC":                         "num_fuc",
  "NUM PERSONAS":                "num_personas",
  "N PERSONAS":                  "num_personas",
  "N° PERSONAS":                 "num_personas",
  "NUMERO DE PERSONAS":          "num_personas",
  "PEP":                         "pep",
  "PRODUCTO":                    "producto",
  "PRODUCTOR":                   "productor",
  "TIPO CAJA":                   "tipo_caja",
  "TRAZABILIDAD":                "trazabilidad",
  "VARIEDAD":                    "variedad",
  "TOTAL JABAS":                 "total_jabas",
  "KG ENTREGADOS":               "kg_entregados",
  "KG EXPORTADOS":               "kg_exportados",
  "ESTADO":                      "estado",
};

const DATE_FIELDS = ["fecha_ingreso","fecha_proceso","ingreso_garita","inicio_descarga","fin_descarga"];

// Normalizar cabecera: UPPERCASE → sin acentos → sin °/º → colapsar espacios
function normalizeHeader(h) {
  return String(h)
    .toUpperCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")  // quitar acentos
    .replace(/[°º]/g, "")                               // quitar grados
    .replace(/\s+/g, " ")                               // colapsar espacios
    .trim();
}

// Convertir valor de fecha a YYYY-MM-DD
function toDateStr(val) {
  if (!val && val !== 0) return "";
  // Serial de Excel (número)
  if (typeof val === "number") {
    const d = new Date((val - 25569) * 86400000);
    if (isNaN(d.getTime())) return "";
    return d.toISOString().slice(0, 10);
  }
  // Ya es Date (SheetJS puede devolverlo así)
  if (val instanceof Date) {
    if (isNaN(val.getTime())) return "";
    return val.toISOString().slice(0, 10);
  }
  // String – intentar parsear
  const s = String(val).trim();
  if (!s) return "";
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
  return s;
}

// Parsear Excel con SheetJS
function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb    = XLSX.read(e.target.result, { type: "array", cellDates: false });
        const ws    = wb.Sheets[wb.SheetNames[0]];
        const raw   = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

        // Buscar fila de cabeceras en las primeras 15 filas
        let headerRowIdx = -1;
        for (let i = 0; i < Math.min(15, raw.length); i++) {
          const norm = raw[i].map(normalizeHeader);
          if (norm.some(h => h === "FUC" || h === "PRODUCTOR" || h === "EXPORTADOR")) {
            headerRowIdx = i;
            break;
          }
        }
        if (headerRowIdx === -1) {
          return reject(new Error("No se encontró fila de cabeceras con FUC, PRODUCTOR o EXPORTADOR en las primeras 15 filas."));
        }

        const rawHeaders = raw[headerRowIdx];
        const normHeaders = rawHeaders.map(normalizeHeader);

        // Construir filas mapeadas
        const rows = [];
        for (let i = headerRowIdx + 1; i < raw.length; i++) {
          const cells = raw[i];
          const obj   = {};
          normHeaders.forEach((nh, j) => {
            const internalKey = COL_MAP[nh];
            if (!internalKey) return;
            let val = cells[j];
            if (DATE_FIELDS.includes(internalKey)) val = toDateStr(val);
            obj[internalKey] = val !== undefined ? val : "";
          });
          // Solo filas con num_fuc
          if (obj["num_fuc"] !== undefined && String(obj["num_fuc"]).trim() !== "") {
            rows.push(obj);
          }
        }

        resolve(rows);
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error("Error al leer el archivo."));
    reader.readAsArrayBuffer(file);
  });
}

// ── DRAG & DROP ───────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  document.getElementById("uploadZone").classList.remove("drag");
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}

async function handleFile(file) {
  if (!file) return;
  const resultDiv  = document.getElementById("uploadResult");
  const msgEl      = document.getElementById("uploadMsg");
  const chipsEl    = document.getElementById("resultChips");

  resultDiv.style.display = "none";
  msgEl.textContent       = "";
  chipsEl.innerHTML       = "";

  try {
    msgEl.textContent       = "⏳ Leyendo Excel…";
    resultDiv.style.display = "block";

    const rows = await parseExcel(file);
    if (rows.length === 0) {
      msgEl.style.color = "var(--red)";
      msgEl.textContent = "❌ No se encontraron filas con num_fuc válido.";
      return;
    }

    msgEl.style.color = "var(--muted)";
    msgEl.textContent = `⏳ Enviando ${rows.length} filas al servidor…`;

    const res = await api("uploadFUC", { rows });

    msgEl.style.color = "var(--green)";
    msgEl.textContent = "✅ " + res.message;
    chipsEl.innerHTML = `
      <span class="chip chip-added">➕ ${res.added} nuevas</span>
      <span class="chip chip-updated">✏️ ${res.updated} actualizadas</span>
      <span class="chip chip-skipped">⏭ ${res.skipped} sin cambios</span>
      <span class="chip chip-total">📊 ${res.total} total</span>
    `;

    loadFUCs();
  } catch(err) {
    resultDiv.style.display = "block";
    msgEl.style.color       = "var(--red)";
    msgEl.textContent       = "❌ " + err.message;
  }

  // Limpiar input para permitir cargar mismo archivo de nuevo
  document.getElementById("fileInput").value = "";
}

// ── FUC TABLE ─────────────────────────────────────────
let allFUCs = [];

async function loadFUCs() {
  document.getElementById("fucTableContainer").innerHTML =
    '<div class="loader"><div class="spinner"></div><p style="margin-top:.5rem">Cargando…</p></div>';
  try {
    const res = await api("getFUCs");
    allFUCs   = res.data || [];
    renderFUCTable(allFUCs);
  } catch(e) {
    document.getElementById("fucTableContainer").innerHTML =
      `<p style="color:var(--red);padding:1rem">Error: ${e.message}</p>`;
    if (e.message.includes("expirad") || e.message.includes("nválido")) logout();
  }
}

function filterFUCTable() {
  const q = document.getElementById("searchFUC").value.toLowerCase();
  const filtered = allFUCs.filter(r =>
    Object.values(r).some(v => String(v).toLowerCase().includes(q))
  );
  renderFUCTable(filtered);
}

function renderFUCTable(rows) {
  if (!rows.length) {
    document.getElementById("fucTableContainer").innerHTML =
      '<p style="padding:1.5rem;color:var(--muted);text-align:center">Sin registros.</p>';
    return;
  }

  const cols = [
    { key:"num_fuc",               label:"N° FUC" },
    { key:"exportador",            label:"Exportador" },
    { key:"productor",             label:"Productor" },
    { key:"lote",                  label:"Lote" },
    { key:"variedad",              label:"Variedad" },
    { key:"fecha_ingreso",         label:"F. Ingreso" },
    { key:"fecha_proceso",         label:"F. Proceso" },
    { key:"guia_ingreso",          label:"Guía Ingreso" },
    { key:"total_jabas",           label:"Total Jabas" },
    { key:"kg_entregados",         label:"Kg Entregados" },
    { key:"kg_exportados",         label:"Kg Exportados" },
    { key:"codigo_lugar_produccion",label:"CLP" },
    { key:"linea_empaque",         label:"Línea" },
    { key:"estado",                label:"Estado" },
  ];

  const ths = cols.map(c => `<th>${c.label}</th>`).join("") + "<th>Acc.</th>";
  const trs = rows.map(g => {
    const tds = cols.map(c => {
      const v = g[c.key] ?? "";
      if (c.key === "estado") {
        const sc = v === "Programado" ? "s-procesado" : v === "No programado" ? "s-piso" : "s-default";
        return `<td><span class="status-badge ${sc}">${v}</span></td>`;
      }
      return `<td>${v}</td>`;
    }).join("");
    return `<tr>${tds}<td>
      <button class="btn btn-danger btn-sm" onclick="deleteFUCRow(${g._row})">🗑️</button>
    </td></tr>`;
  }).join("");

  document.getElementById("fucTableContainer").innerHTML =
    `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

async function deleteFUCRow(rowNum) {
  if (!confirm("¿Eliminar esta FUC?")) return;
  try {
    await api("deleteFUC", { row: rowNum });
    showToast("FUC eliminada.", "success");
    loadFUCs();
  } catch(e) {
    showToast(e.message, "error");
  }
}
